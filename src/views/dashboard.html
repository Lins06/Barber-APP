<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BarberManager - Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <h2>Barber<span>PRO</span></h2>
        </div>
        <nav>
            <a href="dashboard.html" class="active"><i class="fas fa-home"></i> Início</a>
            <a href="agenda.html"><i class="fas fa-calendar-alt"></i> Agenda Geral</a>
            <a href="servicos.html"><i class="fas fa-cut"></i> Serviços</a>
            <a href="financeiro.html"><i class="fas fa-chart-line"></i> Financeiro</a>
            <a href="config.html"><i class="fas fa-cog"></i> Configurações</a>
        </nav>
        <div class="user-info">
            <img src="https://via.placeholder.com/40" alt="Admin">
            <div>
                <p>Gabriel Lins</p>
                <span>Administrador</span>
            </div>
        </div>
    </div>

    <main class="main-content">
        <header>
            <h1>Bem-vindo, <span>Gabriel</span></h1>
            <button class="btn-add"><i class="fas fa-plus"></i> Novo Barbeiro</button>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <i class="fas fa-dollar-sign"></i>
                <div>
                    <span>Hoje</span>
                    <h3 id="ganhosHoje">R$ 0,00</h3>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div>
                    <span>Agendamentos</span>
                    <h3 id="totalAgendamentos">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div>
                    <span>Próximo</span>
                    <h3 id="proximoHorario">--:--</h3>
                </div>
            </div>
        </section>

        <h2>Nossa Equipe</h2>
        <section class="barber-grid" id="barbeiros-container">
            <p style="text-align:center; color:#666; margin-top: 50px;">Carregando barbeiros...</p>
        </section>

        <div id="agendamentos-barbeiro" style="display: none; margin-top: 40px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Agendamentos de <span id="barbeiro-selecionado" style="color: var(--accent);">---</span></h2>
                <button id="btnVoltar" style="background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: 600;">
                    ← Voltar
                </button>
            </div>
            <section id="agendamentos-lista" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
                <p style="text-align:center; color:#666;">Nenhum agendamento encontrado</p>
            </section>
        </div>
    </main>

    <script src="../js/dashboard.js"></script>
</body>
</html>
